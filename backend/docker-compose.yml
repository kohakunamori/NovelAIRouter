services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: novelai_router
      POSTGRES_PASSWORD: novelai_router
      POSTGRES_DB: novelai_router
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U novelai_router -d novelai_router"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
