services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: novelai_router
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d novelai_router"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    image: node:24-slim
    restart: unless-stopped
    working_dir: /workspace/backend
    command: >
      sh -lc "corepack enable &&
      corepack prepare pnpm@10.0.0 --activate &&
      pnpm install --frozen-lockfile &&
      pnpm db:generate &&
      pnpm --filter @novelai-router/api exec prisma migrate deploy &&
      pnpm db:seed &&
      pnpm dev"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/novelai_router
      REDIS_URL: redis://redis:6379
      API_HOST: 0.0.0.0
      API_PORT: 4000
      WEB_ORIGIN: http://localhost:${FRONTEND_PORT:-3000}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me-admin-password}
      STORAGE_ROOT: /data/storage
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    volumes:
      - ./backend:/workspace/backend
      - backend-node-modules:/workspace/backend/node_modules
      - backend-api-node-modules:/workspace/backend/apps/api/node_modules
      - backend-shared-node-modules:/workspace/backend/packages/shared/node_modules
      - api-storage:/data/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:4000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      NOVELAI_ROUTER_ORIGIN: http://api:4000
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
      - frontend-next:/app/.next
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

volumes:
  postgres-data:
  redis-data:
  backend-node-modules:
  backend-api-node-modules:
  backend-shared-node-modules:
  api-storage:
  frontend-node-modules:
  frontend-next:
